<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One's Passport CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#649abd; --mauve:#BEAEBB; --pink:#f5baba;
  --grad:linear-gradient(135deg,#649abd,#BEAEBB 60%,#f5baba);
  --text:#1a1a2e; --sub:#6b7280; --bg:#f8f7fa; --white:#fff;
  --border:#e5e7eb; --red:#ef4444; --green:#3DAA77; --orange:#f59e0b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

/* ── LOGIN ── */
.login-screen{
  display:flex;position:fixed;inset:0;
  background:var(--grad);
  align-items:center;justify-content:center;z-index:999;
}
.login-screen.hidden{display:none;}
.login-box{
  background:var(--white);border-radius:20px;padding:40px;
  width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.login-logo{font-size:18px;font-weight:900;background:var(--grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--sub);margin-bottom:28px;}
.login-label{font-size:12px;font-weight:600;color:var(--sub);display:block;margin-bottom:5px;}
.login-input{
  width:100%;padding:10px 12px;border:1px solid var(--border);
  border-radius:9px;font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;
}
.login-input:focus{border-color:var(--blue);}
.login-btn{
  width:100%;padding:12px;border:none;border-radius:9px;
  background:var(--grad);color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;margin-top:4px;
}
.login-btn:hover{opacity:.88;}
.login-err{font-size:12px;color:var(--red);margin-top:10px;text-align:center;min-height:18px;}
.login-loading{font-size:12px;color:var(--sub);margin-top:10px;text-align:center;min-height:18px;}

/* ── APP ── */
.app{display:none;}
.app.visible{display:flex;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{width:220px;background:var(--text);color:#fff;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sidebar-logo .brand{font-size:15px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sidebar-logo small{display:block;font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px;}
.sidebar-nav{flex:1;padding:10px 0;overflow-y:auto;}
.nav-section{font-size:10px;font-weight:700;color:rgba(255,255,255,0.25);padding:12px 18px 4px;letter-spacing:.08em;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.55);transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{color:#fff;background:rgba(255,255,255,0.05);}
.nav-item.active{color:#fff;border-left-color:var(--blue);background:rgba(100,154,189,0.15);}
.nav-icon{font-size:15px;width:18px;text-align:center;}
.sidebar-bottom{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.08);}
.user-info{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:8px;word-break:break-all;}
.logout-btn{font-size:11px;color:rgba(255,255,255,0.4);background:none;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:5px 10px;cursor:pointer;width:100%;font-family:inherit;}
.logout-btn:hover{color:#fff;border-color:rgba(255,255,255,0.4);}

/* ── MAIN ── */
.main{flex:1;overflow:auto;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.page-title{font-size:15px;font-weight:700;}
.topbar-right{display:flex;gap:8px;align-items:center;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-primary{background:var(--grad);color:#fff;}.btn-primary:hover{opacity:.88;}
.btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--border);}.btn-ghost:hover{background:var(--bg);}
.btn-danger{background:#fee2e2;color:var(--red);}.btn-danger:hover{background:#fecaca;}
.btn-sm{padding:4px 11px;font-size:12px;}

.content{padding:20px 24px;}
.page{display:none;}.page.active{display:block;}

/* ── LOADING OVERLAY ── */
.page-loading{
  display:none;position:fixed;inset:0;background:rgba(255,255,255,.7);
  align-items:center;justify-content:center;z-index:50;font-size:14px;color:var(--sub);
  flex-direction:column;gap:10px;
}
.page-loading.visible{display:flex;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px;}
.stat-card{background:var(--white);border-radius:12px;padding:18px;border:1px solid var(--border);}
.stat-label{font-size:11px;color:var(--sub);margin-bottom:6px;}
.stat-val{font-size:26px;font-weight:900;}
.stat-val.grad{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-sub{font-size:11px;color:var(--sub);margin-top:3px;}

/* ── PANELS ── */
.section-row{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;margin-bottom:20px;}
.panel{background:var(--white);border-radius:12px;padding:18px;border:1px solid var(--border);}
.panel-title{font-size:13px;font-weight:700;margin-bottom:14px;}
.funnel-item{display:flex;align-items:center;gap:10px;padding:5px 0;}
.funnel-label{width:130px;font-size:12px;flex-shrink:0;}
.funnel-bar-wrap{flex:1;background:var(--bg);border-radius:4px;height:14px;overflow:hidden;}
.funnel-bar{height:100%;border-radius:4px;transition:width .4s;}
.funnel-count{width:28px;font-size:12px;font-weight:700;text-align:right;}

/* ── ALERTS ── */
.alert-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;background:#fef3c7;font-size:12px;cursor:pointer;margin-bottom:6px;}
.alert-item.overdue{background:#fee2e2;}
.alert-item:hover{opacity:.88;}

/* ── TABLE ── */
.table-card{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.table-toolbar{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.search-row{display:flex;gap:8px;flex-wrap:wrap;}
.search-input{padding:6px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;width:170px;}
.search-input:focus{border-color:var(--blue);}
.filter-select{padding:6px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;cursor:pointer;background:var(--white);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:9px 14px;font-size:11px;font-weight:700;color:var(--sub);background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--text);}
.sort-arrow{margin-left:3px;opacity:.4;}
th.sorted .sort-arrow{opacity:1;color:var(--blue);}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;cursor:pointer;}
.badge{display:inline-block;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap;}
.source-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;background:rgba(100,154,189,.1);color:var(--blue);font-weight:600;}
.num-badge{display:inline-block;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:11px;font-weight:700;color:var(--sub);}
.milestone-dots{display:flex;gap:4px;}
.milestone-dot{width:8px;height:8px;border-radius:50%;background:var(--border);}
.milestone-dot.done{background:var(--green);}

/* ── KANBAN ── */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;}
.kanban-col{min-width:190px;flex-shrink:0;background:var(--bg);border-radius:12px;padding:10px;}
.kanban-col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.kanban-col-title{font-size:12px;font-weight:700;}
.kanban-count{font-size:11px;background:rgba(0,0,0,.08);padding:2px 7px;border-radius:100px;font-weight:600;}
.kanban-card{background:var(--white);border-radius:8px;padding:10px;border:1px solid var(--border);cursor:pointer;transition:box-shadow .15s;margin-bottom:7px;}
.kanban-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);}
.kanban-card.stale{background:#fff0f3;border-color:#f5baba;}
.kanban-card-num{font-size:10px;color:var(--sub);margin-bottom:2px;}
.kanban-card-name{font-size:13px;font-weight:600;margin-bottom:3px;}
.kanban-card-meta{font-size:11px;color:var(--sub);}
.kanban-card-cs{font-size:11px;margin-top:4px;}
.kanban-stale-badge{font-size:10px;color:#c0392b;font-weight:700;margin-top:4px;}

/* ── COHORT TABLE ── */
.cohort-wrap{overflow-x:auto;margin-bottom:20px;}
.cohort-table{border-collapse:collapse;font-size:12px;white-space:nowrap;}
.cohort-table th{padding:6px 10px;background:var(--bg);border:1px solid var(--border);font-weight:700;text-align:center;color:var(--sub);}
.cohort-table td{padding:5px 10px;border:1px solid var(--border);text-align:center;}
.cohort-table td.month-label{font-weight:700;text-align:left;background:var(--bg);}
.cohort-table td.num{color:var(--blue);font-weight:700;}
.cohort-table td.rate{color:var(--green);font-weight:600;}
.cohort-table td.contracted{color:#f97316;font-weight:700;}
.cohort-table td.crate{color:#8b5cf6;font-weight:600;}
.cohort-table td.zero{color:#ccc;}
.analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.analysis-card{background:var(--white);border-radius:12px;padding:16px;border:1px solid var(--border);}
.analysis-title{font-size:13px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.analysis-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bg);font-size:13px;}
.analysis-row:last-child{border-bottom:none;}
.analysis-label{color:var(--sub);}
.analysis-val{font-weight:700;color:var(--text);}
.report-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px;}
.report-tab{padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--sub);}
.report-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.report-section{display:none;}.report-section.active{display:block;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--white);border-radius:16px;width:100%;max-width:700px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-header{padding:18px 22px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--white);z-index:2;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;font-size:19px;cursor:pointer;color:var(--sub);}
.modal-body{padding:18px 22px;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--white);}

/* ── FORM ── */
.form-section{margin-bottom:20px;}
.form-section-title{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group.full{grid-column:1/-1;}
label{font-size:11px;font-weight:600;color:var(--sub);}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
textarea{resize:vertical;min-height:70px;}
.checkbox-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;}
.checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
.checkbox-row.checked{border-color:var(--green);background:rgba(61,170,119,.06);}

/* ── CS SESSIONS ── */
.cs-sessions{display:flex;flex-direction:column;gap:6px;}
.cs-session{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg);border-radius:8px;}
.cs-session-num{width:52px;font-size:12px;font-weight:600;color:var(--sub);flex-shrink:0;}
.cs-session input[type=date]{flex:1;border:1px solid var(--border);padding:5px 8px;}
.cs-session input[type=text]{flex:2;border:1px solid var(--border);padding:5px 8px;}
.cs-add-btn{font-size:12px;color:var(--blue);cursor:pointer;background:none;border:1px dashed var(--blue);border-radius:6px;padding:5px 12px;font-family:inherit;margin-top:4px;}
.cs-add-btn:hover{background:rgba(100,154,189,.08);}
.cs-remove{background:none;border:none;color:var(--sub);cursor:pointer;font-size:15px;padding:2px;}
.cs-remove:hover{color:var(--red);}

/* ── DETAIL ── */
.detail-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;}
.detail-tab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--sub);transition:all .15s;}
.detail-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700;}
.detail-tab-content{display:none;}
.detail-tab-content.active{display:block;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.detail-item label{font-size:11px;color:var(--sub);display:block;margin-bottom:2px;}
.detail-item span{font-size:13px;font-weight:500;}
.detail-section-title{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.milestones-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.milestone-item{display:flex;flex-direction:column;align-items:center;padding:10px;border-radius:10px;border:1px solid var(--border);text-align:center;}
.milestone-item.done{border-color:var(--green);background:rgba(61,170,119,.06);}
.milestone-item .m-icon{font-size:22px;margin-bottom:4px;}
.milestone-item .m-label{font-size:11px;font-weight:600;color:var(--sub);}
.milestone-item.done .m-label{color:var(--green);}
.cs-timeline{display:flex;flex-direction:column;gap:6px;}
.cs-entry{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;background:var(--bg);border-radius:8px;}
.cs-entry-num{font-size:11px;font-weight:700;color:var(--white);background:var(--blue);padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:1px;}
.cs-entry-date{font-size:12px;font-weight:600;color:var(--text);min-width:80px;}
.cs-entry-memo{font-size:12px;color:var(--sub);}
.notes-list{display:flex;flex-direction:column;gap:7px;}
.note-item{background:var(--bg);border-radius:8px;padding:9px 12px;}
.note-meta{font-size:11px;color:var(--sub);margin-bottom:3px;}
.note-text{font-size:13px;line-height:1.6;}
.add-note-area{display:flex;gap:7px;margin-top:9px;}
.add-note-area textarea{flex:1;min-height:55px;}
.stage-quick{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg);border-radius:10px;margin-bottom:14px;flex-wrap:wrap;}
.stage-quick label{font-size:13px;font-weight:600;white-space:nowrap;}
.stage-quick select{flex:1;min-width:160px;}

/* ── MONTHLY ── */
.monthly-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.monthly-card{background:var(--white);border-radius:10px;padding:14px;border:1px solid var(--border);}
.monthly-month{font-size:12px;color:var(--sub);margin-bottom:6px;}
.monthly-nums{display:flex;gap:12px;}
.monthly-num .n{font-size:20px;font-weight:900;color:var(--blue);}
.monthly-num .l{font-size:10px;color:var(--sub);}
.monthly-cvr{font-size:11px;color:var(--green);font-weight:700;margin-top:5px;}

.empty-state{text-align:center;padding:50px 20px;color:var(--sub);}
.empty-state .icon{font-size:44px;margin-bottom:10px;}
</style>
</head>
<body>

<!-- ── ログイン画面 ── -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">One's Passport CRM</div>
    <div class="login-sub">チームメンバーのみアクセス可能</div>
    <label class="login-label">メールアドレス</label>
    <input class="login-input" type="email" id="login-email" placeholder="example@email.com" autocomplete="email">
    <label class="login-label">パスワード</label>
    <input class="login-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-loading" id="login-loading"></div>
  </div>
</div>

<!-- ── ローディング ── -->
<div class="page-loading" id="page-loading">
  <div class="spinner"></div>
  <span>読み込み中...</span>
</div>

<!-- ── アプリ本体 ── -->
<div class="app" id="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="brand">One's Passport CRM</div>
    <small>顧客管理システム</small>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">メイン</div>
    <div class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span> ダッシュボード</div>
    <div class="nav-item" data-page="customers"><span class="nav-icon">👥</span> 顧客一覧</div>
    <div class="nav-item" data-page="kanban"><span class="nav-icon">📋</span> ステージ管理</div>
    <div class="nav-section">分析</div>
    <div class="nav-item" data-page="monthly"><span class="nav-icon">📈</span> 月次レポート</div>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-info" id="user-email-display"></div>
    <button class="logout-btn" onclick="doLogout()">🔓 ログアウト</button>
  </div>
</aside>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="page-dashboard" class="page active">
  <div class="topbar">
    <div class="page-title">ダッシュボード</div>
    <div class="topbar-right">
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ CSV出力</button>
      <button class="btn btn-primary" onclick="openAddModal()">＋ 顧客を追加</button>
    </div>
  </div>
  <div class="content">
    <div class="stat-grid" id="stat-grid"></div>
    <div class="section-row">
      <div class="panel"><div class="panel-title">ステージ別人数</div><div id="funnel-list"></div></div>
      <div class="panel"><div class="panel-title">⚠️ フォロー要確認</div><div id="alert-list"></div></div>
    </div>
  </div>
</div>

<!-- CUSTOMERS -->
<div id="page-customers" class="page">
  <div class="topbar">
    <div class="page-title">顧客一覧</div>
    <div class="topbar-right">
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ CSV出力</button>
      <button class="btn btn-primary" onclick="openAddModal()">＋ 顧客を追加</button>
    </div>
  </div>
  <div class="content">
    <div class="table-card">
      <div class="table-toolbar">
        <div class="search-row">
          <input class="search-input" type="text" placeholder="名前で検索..." id="search-input" oninput="renderTable()">
          <select class="filter-select" id="filter-stage" onchange="renderTable()"><option value="">全ステージ</option></select>
          <select class="filter-select" id="filter-country" onchange="renderTable()">

<script>

const STAGES = ['LINE追加済み','初回CS済み','継続CS中','渡航前準備中','デポジット済み','契約完了','渡航中','渡航完了','キャンセル'];

};

let customers = [];

let csCount = 0;
let tablePage = 1;

let _currentSession = null; // セッションを保持

// ※ ログイン画面はHTMLで最初からvisibleにしてあるので即表示される

// ━━━━━━━ AUTH ━━━━━━━
function showLogin(){ document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('app').classList.remove('visible'); }
function showApp(email){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-email-display').textContent = email;
}
function showPageLoading(v){ /* スピナー廃止 */ }

async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-err');
  const ldEl  = document.getElementById('login-loading');
  errEl.textContent = ''; ldEl.textContent = 'ログイン中...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  ldEl.textContent = '';
  if(error){ errEl.textContent = 'メールアドレスまたはパスワードが違います'; return; }
}

async function doLogout(){
  await sb.auth.signOut();
  customers = [];
  showLogin();
}

let appReady = false; // 二重発火防止フラグ

sb.auth.onAuthStateChange(async (event, session) => {
  if(event === 'SIGNED_OUT' || !session){
    appReady = false;
    customers = [];
    showLogin();
    return;
  }
  // INITIAL_SESSION と SIGNED_IN のどちらか1回だけ処理する
  if(appReady) return;
  appReady = true;
  _currentSession = session;

  showApp(session.user.email);
  // セッションを直接渡してデータ取得（getSession()の余計なネットワーク呼び出しを省く）
  try {
    await loadCustomers(session);
  } catch(e) {
    console.error('load error:', e);
    document.getElementById('stat-grid') && (document.getElementById('stat-grid').innerHTML =
      `<div style="color:red;padding:16px;grid-column:1/-1">❌ エラー: ${e.message}</div>`);
  }
  renderDashboard();
});

// ━━━━━━━ DATA (Supabase) ━━━━━━━
async function loadCustomers(session){
  const SUPABASE_URL = 'https://zibixluyzqifscsklgzz.supabase.co';
  const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppYml4bHV5enFpZnNjc2tsZ3p6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODIwNTksImV4cCI6MjA5MzM1ODA1OX0.p4Q8yiK2ZtzhYz_qOZIU26oaTrl01vOltz1X-37EKAk';
  const token = session?.access_token || ANON_KEY;

  function showDiag(msg, color='#333'){
    const el = document.getElementById('stat-grid');
    if(el) el.innerHTML = `<div style="padding:16px;font-size:13px;color:${color};background:#f9f9f9;border-radius:10px;border:1px solid #ddd;grid-column:1/-1">${msg}</div>`;
  }

  // Supabase JSクライアントを経由せず直接REST APIで取得
  let res;
  try {
    res = await fetch(
      `${SUPABASE_URL}/rest/v1/customers?order=num.asc&limit=1000`,
      {
        headers: {
          'apikey': ANON_KEY,
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      }
    );
  } catch(e) {
    showDiag(`❌ ネットワークエラー: ${e.message}<br><small>SupabaseへのアクセスがブロックされているかCORSエラーです</small>`, 'red');
    customers = [];
    return;
  }

  if(!res.ok){
    const txt = await res.text();
    showDiag(`❌ APIエラー ${res.status}: ${txt}`, 'red');
    customers = [];
    return;
  }

  customers = await res.json();
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function nextNum(){ return customers.length ? Math.max(...customers.map(c=>c.num||0)) + 1 : 1; }

function _apiHeaders(){
  const session = sb.auth.session?.() || null;
  const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppYml4bHV5enFpZnNjc2tsZ3p6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODIwNTksImV4cCI6MjA5MzM1ODA1OX0.p4Q8yiK2ZtzhYz_qOZIU26oaTrl01vOltz1X-37EKAk';
  const token = _currentSession?.access_token || ANON_KEY;
  return { 'apikey': ANON_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
}

    `https://zibixluyzqifscsklgzz.supabase.co/rest/v1/customers?on_conflict=id`,
    { method: 'POST', headers: { ..._apiHeaders(), 'Prefer': 'resolution=merge-duplicates,return=minimal' }, body: JSON.stringify(record) }
  );

// ━━━━━━━ NAV ━━━━━━━
document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click', function(){
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    this.classList.add('active');
    const page = this.dataset.page;
    document.getElementById('page-'+page).classList.add('active');
    if(page==='dashboard') renderDashboard();
    if(page==='customers') renderTable();
    if(page==='kanban') renderKanban();
    if(page==='monthly') renderMonthly();
  });
});

// ━━━━━━━ DASHBOARD ━━━━━━━
function renderDashboard(){
  const now=new Date(), tm=now.getMonth(), ty=now.getFullYear();
  const total = customers.length;
  const converted = customers.filter(c=>['契約完了','渡航中','渡航完了'].includes(c.stage)).length;
  const newThis = customers.filter(c=>{ const d=parseDate(c.created_at); return d&&d.getMonth()===tm&&d.getFullYear()===ty; }).length;
  const cvr = total>0 ? Math.round(converted/total*100) : 0;
  const today = new Date(); today.setHours(0,0,0,0);
  const followPending = customers.filter(c=>c.follow_up && new Date(c.follow_up)<=today).length;

  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card"><div class="stat-label">総顧客数</div><div class="stat-val grad">${total}</div><div class="stat-sub">累計</div></div>
    <div class="stat-card"><div class="stat-label">今月新規</div><div class="stat-val grad">${newThis}</div><div class="stat-sub">人</div></div>
    <div class="stat-card"><div class="stat-label">契約完了</div><div class="stat-val grad">${converted}</div><div class="stat-sub">累計</div></div>
    <div class="stat-card"><div class="stat-label">成約率</div><div class="stat-val grad">${cvr}%</div><div class="stat-sub">契約 / 総顧客</div></div>
    <div class="stat-card"><div class="stat-label">要フォロー</div><div class="stat-val" style="color:var(--red)">${followPending}</div><div class="stat-sub">期限切れ / 今日</div></div>
  `;

  const maxN = Math.max(...STAGES.map(s=>customers.filter(c=>c.stage===s).length), 1);
  document.getElementById('funnel-list').innerHTML = STAGES.map(s=>{
    const n = customers.filter(c=>c.stage===s).length;
    return `<div class="funnel-item">
      <div class="funnel-label"><span style="color:${STAGE_COLORS[s]};font-weight:600">${s}</span></div>
      <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${Math.round(n/maxN*100)}%;background:${STAGE_COLORS[s]}"></div></div>
      <div class="funnel-count">${n}</div>
    </div>`;
  }).join('');

  const soon = new Date(today); soon.setDate(soon.getDate()+3);
  const alerts = customers.filter(c=>c.follow_up && new Date(c.follow_up)<=soon)
    .sort((a,b)=>new Date(a.follow_up)-new Date(b.follow_up));
  document.getElementById('alert-list').innerHTML = alerts.length
    ? alerts.slice(0,6).map(c=>{
        const overdue = new Date(c.follow_up)<today;
        return `<div class="alert-item ${overdue?'overdue':''}" onclick="openDetail('${c.id}')">
          <div><div style="font-weight:600">${c.name}</div><div style="font-size:11px;color:var(--sub)">${c.stage}</div></div>
          <div style="font-size:11px">${fmtDate(c.follow_up)}</div>
        </div>`;
      }).join('')
    : '<div style="font-size:12px;color:var(--sub);text-align:center;padding:20px">要確認の顧客はいません ✓</div>';
}

// ━━━━━━━ TABLE ━━━━━━━
function renderTable(){
  const sf = document.getElementById('filter-stage');
  if(sf.options.length<=1) STAGES.forEach(s=>{ const o=document.createElement('option');o.value=s;o.textContent=s;sf.appendChild(o); });

  const q = document.getElementById('search-input').value.toLowerCase();
  const stageV = sf.value;
  const cntryV = document.getElementById('filter-country').value;
  const ownrV  = document.getElementById('filter-owner').value;

  let list = customers.filter(c=>{
    if(q && !c.name.toLowerCase().includes(q)) return false;
    if(stageV && c.stage!==stageV) return false;
    if(cntryV && c.destination!==cntryV) return false;
    if(ownrV  && c.owner!==ownrV) return false;
    return true;
  }).sort((a,b)=>{
    let av=a[sortCol]||'', bv=b[sortCol]||'';
    if(sortCol==='num'){ return ((a.num||0)-(b.num||0))*sortDir; }
    return av<bv ? -sortDir : av>bv ? sortDir : 0;
  });

  const totalCount = list.length;
  document.getElementById('table-count').textContent = `${totalCount} 件`;
  if(!totalCount){ document.getElementById('table-container').innerHTML='<div class="empty-state"><div class="icon">👥</div><p>条件に合う顧客がいません</p></div>'; return; }

  // ページネーション
  const totalPages = Math.ceil(totalCount / TABLE_PER_PAGE);
  if(tablePage > totalPages) tablePage = totalPages;
  const paged = list.slice((tablePage-1)*TABLE_PER_PAGE, tablePage*TABLE_PER_PAGE);

  const today=new Date(); today.setHours(0,0,0,0);
  const soon=new Date(today); soon.setDate(soon.getDate()+3);
  const sa = col => `<span class="sort-arrow">${sortCol===col?(sortDir===1?'↑':'↓'):'↕'}</span>`;

  const pageNav = totalPages > 1 ? `
    <div style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid var(--border);font-size:13px;">
      <button class="btn btn-ghost btn-sm" onclick="tablePageGo(${tablePage-1})" ${tablePage<=1?'disabled':''}>← 前へ</button>

function renderKanban(){
  const today = new Date(); today.setHours(0,0,0,0);
  const KANBAN_STAGES = STAGES.filter(s => s !== 'LINE追加済み'); // ① LINE追加済みを非表示

  document.getElementById('kanban-board').innerHTML = KANBAN_STAGES.map(stage=>{
    const cols = customers.filter(c=>c.stage===stage);
    return `<div class="kanban-col">
      <div class="kanban-col-header">
        <div class="kanban-col-title" style="color:${STAGE_COLORS[stage]}">${stage}</div>
        <div class="kanban-count">${cols.length}</div>
      </div>
      ${cols.map(c=>{
        const n=(c.cs_sessions||[]).filter(s=>s.date).length;
        // ② 初回CS済みで3週間以上経過・進捗なし → ピンク
        let stale = false;
        let staleDays = 0;
        if(stage === '初回CS済み' && n <= 1){
          const firstDate = parseDate(c.created_at);
          if(firstDate){
            staleDays = Math.floor((today - firstDate) / 86400000);
            if(staleDays >= 21) stale = true;
          }
        }
        return `<div class="kanban-card${stale?' stale':''}" onclick="openDetail('${c.id}')">
          <div class="kanban-card-num">#${c.num||'―'}</div>
          <div class="kanban-card-name">${c.name}</div>
          <div class="kanban-card-meta">${c.destination||''} ${c.type||''}</div>
          ${n?`<div class="kanban-card-cs" style="color:${STAGE_COLORS[stage]}">CS ${n}回</div>`:''}
          ${stale?`<div class="kanban-stale-badge">⚠️ 初回CS から ${staleDays}日経過</div>`:''}
          <div class="milestone-dots" style="margin-top:5px">
            ${[c.elme,c.deposit,c.contract].map(v=>`<div class="milestone-dot ${v?'done':''}"></div>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function renderMonthly(){
  const now=new Date();

  // 月リスト（過去18ヶ月）
  const MONTHS = [];
  for(let i=17;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    MONTHS.push({y:d.getFullYear(), m:d.getMonth(), label:`${d.getFullYear()}年${d.getMonth()+1}月`, key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`});
  }

  // 日数差を計算するヘルパー
  function daysDiff(a, b){ return a&&b ? Math.floor((b-a)/86400000) : null; }

  // 各月のコホートデータを構築
  function buildCohort(ym_key){
    // ①その月に初回CSを受けた人
    const group = customers.filter(c=>{
      const cd = parseDate(c.created_at);
      if(!cd) return false;
      const key = `${cd.getFullYear()}-${String(cd.getMonth()+1).padStart(2,'0')}`;
      return key === ym_key && c.stage !== 'キャンセル';
    });

    const total = group.length; // ①

    // ②1ヶ月以内に2回目CS
    const cs2_1m = group.filter(c=>{
      const sessions = (c.cs_sessions||[]).filter(s=>s.date);
      if(sessions.length < 2) return false;
      const first = parseDate(sessions[0].date);
      const second = parseDate(sessions[1].date);
      const d = daysDiff(first, second);
      return d !== null && d <= 31;
    }).length;

    // ③2ヶ月以内に2回目CS
    const cs2_2m = group.filter(c=>{
      const sessions = (c.cs_sessions||[]).filter(s=>s.date);
      if(sessions.length < 2) return false;
      const first = parseDate(sessions[0].date);
      const second = parseDate(sessions[1].date);
      const d = daysDiff(first, second);
      return d !== null && d <= 62;
    }).length;

    // ④契約数（contract_dateがある人）
    const contracted = group.filter(c=>c.contract_date || c.contract).length;

    // ⑤初回CSから6ヶ月以内に契約
    const contract_6m = group.filter(c=>{
      if(!c.contract_date) return false;
      const first = parseDate(c.created_at);
      const cdate = parseDate(c.contract_date);
      const d = daysDiff(first, cdate);
      return d !== null && d <= 180;
    }).length;

    return { total, cs2_1m, cs2_2m, contracted, contract_6m };
  }

  // ── ① KPIテーブルHTML ──
  function pct(n, total){ return total>0 ? `<span class="kpi-pct">(${Math.round(n/total*100)}%)</span>` : ''; }
  function kpiCell(n, total, color){
    if(!total) return `<td class="zero">―</td>`;
    return `<td><span style="font-weight:700;color:${color}">${n}</span>${pct(n,total)}</td>`;
  }

  let kpiHtml = `
  <div class="panel cohort-wrap">
    <div class="panel-title">📊 月次KPIテーブル（初回CS月別コホート）</div>
    <table class="cohort-table" style="min-width:720px">
      <thead>
        <tr>
          <th rowspan="2" style="min-width:90px">月</th>
          <th>①初回CS数</th>
          <th colspan="2">②2回目CS（1ヶ月以内）</th>
          <th colspan="2">③2回目CS（2ヶ月以内）</th>
          <th colspan="2">④契約数</th>
          <th colspan="2">⑤6ヶ月以内契約</th>
        </tr>
        <tr>
          <th style="color:var(--blue)">人数</th>
          <th style="color:var(--mauve)">人数</th><th style="color:var(--mauve)">率</th>
          <th style="color:#8b5cf6">人数</th><th style="color:#8b5cf6">率</th>
          <th style="color:var(--green)">人数</th><th style="color:var(--green)">率</th>
          <th style="color:#f97316">人数</th><th style="color:#f97316">率</th>
        </tr>
      </thead>
      <tbody>`;

  let totalRow = {total:0, cs2_1m:0, cs2_2m:0, contracted:0, contract_6m:0};
  MONTHS.forEach(({key, label})=>{
    const c = buildCohort(key);
    totalRow.total += c.total;
    totalRow.cs2_1m += c.cs2_1m;
    totalRow.cs2_2m += c.cs2_2m;
    totalRow.contracted += c.contracted;
    totalRow.contract_6m += c.contract_6m;
    if(!c.total){ return; }
    kpiHtml += `<tr>
      <td class="month-label">${label}</td>
      <td><strong style="color:var(--blue)">${c.total}</strong></td>
      <td class="${c.cs2_1m?'num':'zero'}">${c.cs2_1m||'0'}</td>
      <td class="${c.cs2_1m?'rate':'zero'}">${c.total?Math.round(c.cs2_1m/c.total*100)+'%':'―'}</td>
      <td class="${c.cs2_2m?'num':'zero'}" style="color:#8b5cf6">${c.cs2_2m||'0'}</td>
      <td class="${c.cs2_2m?'rate':'zero'}" style="color:#8b5cf6">${c.total?Math.round(c.cs2_2m/c.total*100)+'%':'―'}</td>
      <td class="${c.contracted?'contracted':'zero'}">${c.contracted||'0'}</td>
      <td class="${c.contracted?'crate':'zero'}">${c.total?Math.round(c.contracted/c.total*100)+'%':'―'}</td>
      <td style="font-weight:700;color:#f97316">${c.contract_6m||'0'}</td>
      <td style="color:#f97316">${c.total?Math.round(c.contract_6m/c.total*100)+'%':'―'}</td>
    </tr>`;
  });

  // 合計行
  kpiHtml += `<tr style="background:#f0f4ff;font-weight:700;border-top:2px solid var(--blue)">
    <td class="month-label">合計 / 平均</td>
    <td style="color:var(--blue)">${totalRow.total}</td>
    <td style="color:var(--mauve)">${totalRow.cs2_1m}</td>
    <td style="color:var(--mauve)">${totalRow.total?Math.round(totalRow.cs2_1m/totalRow.total*100)+'%':'―'}</td>
    <td style="color:#8b5cf6">${totalRow.cs2_2m}</td>
    <td style="color:#8b5cf6">${totalRow.total?Math.round(totalRow.cs2_2m/totalRow.total*100)+'%':'―'}</td>
    <td style="color:var(--green)">${totalRow.contracted}</td>
    <td style="color:var(--green)">${totalRow.total?Math.round(totalRow.contracted/totalRow.total*100)+'%':'―'}</td>
    <td style="color:#f97316">${totalRow.contract_6m}</td>
    <td style="color:#f97316">${totalRow.total?Math.round(totalRow.contract_6m/totalRow.total*100)+'%':'―'}</td>
  </tr>`;

  kpiHtml += `</tbody></table>
    <div style="margin-top:10px;font-size:11px;color:var(--sub)">
      ※②③は cs_sessions の初回→2回目の日数差で計算　※④⑤は5期シートの支払い完了日（AI列）を使用
    </div>
  </div>`;

  // 流入元バーチャート
  const sources = [...new Set(customers.map(c=>c.source).filter(Boolean))].sort();
  const maxSrc = Math.max(...sources.map(s=>customers.filter(c=>c.source===s).length),1);
  let srcHtml = `<div class="panel"><div class="panel-title">流入元別 顧客数</div>`;
  sources.forEach(s=>{
    const n=customers.filter(c=>c.source===s).length;
    const nc=customers.filter(c=>c.source===s&&c.contract).length;
    srcHtml+=`<div class="funnel-item">
      <div class="funnel-label" style="width:140px">${s}</div>
      <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${Math.round(n/maxSrc*100)}%;background:var(--mauve)"></div></div>
      <div class="funnel-count">${n}人 <span style="color:var(--green);font-size:11px">契約${nc}</span></div></div>`;
  });
  srcHtml += '</div>';

  // ── コホート表（渡航先別）──
  function getCohort(y, m, dest){
    const group = customers.filter(c=>{
      const cd=parseDate(c.created_at);
      if(!cd||cd.getFullYear()!==y||cd.getMonth()!==m) return false;
      if(c.stage==='キャンセル') return false;
      if(dest && c.destination!==dest) return false;
      return true;
    });
    const cs2 = group.filter(c=>(c.cs_sessions||[]).filter(s=>s.date).length>=2).length;
    const contracted = group.filter(c=>c.contract).length;
    return { total:group.length, cs2, contracted };
  }

  function cohortTable(dest, label){
    let html=`<div class="panel cohort-wrap" style="margin-bottom:16px">
      <div class="panel-title">● ${label}</div>
      <table class="cohort-table">
        <thead><tr>
          <th>月</th><th>初回CS数</th><th>2回目CS数</th><th>2回目率</th><th>契約数</th><th>契約率</th>
        </tr></thead><tbody>`;
    MONTHS.forEach(({y,m,label})=>{
      const c=getCohort(y,m,dest);
      const cs2r=c.total>0?Math.round(c.cs2/c.total*100):null;
      const cvr=c.total>0?Math.round(c.contracted/c.total*100):null;
      html+=`<tr>
        <td class="month-label">${label}</td>
        <td class="${c.total?'num':'zero'}">${c.total||'―'}</td>
        <td class="${c.cs2?'num':'zero'}">${c.total?c.cs2:'―'}</td>
        <td class="${cs2r!==null?'rate':'zero'}">${cs2r!==null?cs2r+'%':'―'}</td>
        <td class="${c.contracted?'contracted':'zero'}">${c.total?c.contracted:'―'}</td>
        <td class="${cvr!==null?'crate':'zero'}">${cvr!==null?cvr+'%':'―'}</td>
      </tr>`;
    });
    html+='</tbody></table></div>';
    return html;
  }

  let cohortHtml = cohortTable(null,'全体');
  cohortHtml += cohortTable('オーストラリア','オーストラリア');
  cohortHtml += cohortTable('カナダ','カナダ');
  cohortHtml += cohortTable('フィリピン（セブ）','フィリピン（セブ）');

  // ── 国別・種別分析 ──
  function analysisCard(title, rows){
    return `<div class="analysis-card">
      <div class="analysis-title">${title}</div>
      ${rows.map(([label, filterFn])=>{
        const total = customers.filter(c=>filterFn(c)&&c.stage!=='キャンセル').length;
        const contracts = customers.filter(c=>c.contract&&filterFn(c)).length;
        const cvr = total>0?Math.round(contracts/total*100):0;
        return `<div class="analysis-row">
          <span class="analysis-label">${label}</span>
          <span class="analysis-val">
            <span style="color:var(--blue)">${total}人</span>
            <span style="color:var(--green);margin-left:8px">契約${contracts}(${cvr}%)</span>
          </span>
        </div>`;
      }).join('')}
    </div>`;
  }

  const destRows = [
    ['オーストラリア', c=>c.destination==='オーストラリア'],
    ['カナダ',         c=>c.destination==='カナダ'],
    ['フィリピン（セブ）', c=>c.destination==='フィリピン（セブ）'],
    ['2か国',         c=>c.destination==='2か国'],
    ['その他・未定',   c=>!['オーストラリア','カナダ','フィリピン（セブ）','2か国'].includes(c.destination)],
  ];
  const sourceRows2 = [...new Set(customers.map(c=>c.source).filter(Boolean))].sort().map(s=>[s, c=>c.source===s]);

  let analysisHtml = `<div class="analysis-grid">
    ${analysisCard('🌏 渡航先別 成約分析', destRows)}
    <div class="analysis-card">
      <div class="analysis-title">📊 全体サマリー</div>
      ${[
        ['総顧客数（キャンセル除く）', customers.filter(c=>c.stage!=='キャンセル').length+'人'],
        ['契約完了（contract=true）', customers.filter(c=>c.contract).length+'人'],
        ['契約日登録済み', customers.filter(c=>c.contract_date).length+'人'],
        ['全体成約率', customers.filter(c=>c.stage!=='キャンセル').length>0?Math.round(customers.filter(c=>c.contract).length/customers.filter(c=>c.stage!=='キャンセル').length*100)+'%':'―'],
        ['2回目CS取得率', customers.filter(c=>c.stage!=='キャンセル').length>0?Math.round(customers.filter(c=>(c.cs_sessions||[]).filter(s=>s.date).length>=2).length/customers.filter(c=>c.stage!=='キャンセル').length*100)+'%':'―'],
      ].map(([l,v])=>`<div class="analysis-row"><span class="analysis-label">${l}</span><span class="analysis-val">${v}</span></div>`).join('')}
    </div>
  </div>
  <div class="analysis-grid">
    ${analysisCard('📣 流入元別 成約分析', sourceRows2.length ? sourceRows2 : [['データなし',()=>false]])}
  </div>`;

  document.getElementById('monthly-content').innerHTML = `
    <div class="report-tabs">
      <div class="report-tab${reportTab==='kpi'?' active':''}" data-tab="kpi" onclick="switchReportTab('kpi')">📊 月次KPI</div>
      <div class="report-tab${reportTab==='cohort'?' active':''}" data-tab="cohort" onclick="switchReportTab('cohort')">コホート分析</div>
      <div class="report-tab${reportTab==='analysis'?' active':''}" data-tab="analysis" onclick="switchReportTab('analysis')">国別・種別分析</div>
    </div>
    <div id="rs-kpi" class="report-section${reportTab==='kpi'?' active':''}">${kpiHtml}${srcHtml}</div>
    <div id="rs-cohort" class="report-section${reportTab==='cohort'?' active':''}">${cohortHtml}</div>
    <div id="rs-analysis" class="report-section${reportTab==='analysis'?' active':''}">${analysisHtml}</div>
  `;
}

  } else {
    textIds.forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });

function renderCSFields(sessions){
  const container=document.getElementById('cs-sessions-edit');
  container.innerHTML='';
  const list=sessions.length?sessions:[{date:'',memo:''}];
  list.forEach((s,i)=>{ csCount=i+1; addCSFieldWith(s.date||'',s.memo||'',csCount); });
}

function addCSField(){ csCount++; addCSFieldWith('','',csCount); }

function addCSFieldWith(date,memo,n){
  const div=document.createElement('div'); div.className='cs-session';
  div.innerHTML=`<span class="cs-session-num">${n}回目</span>
    <input type="date" value="${date}">
    <input type="text" value="${memo}" placeholder="メモ">
    <button class="cs-remove" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('cs-sessions-edit').appendChild(div);
}

function closeAddModal(){ document.getElementById('add-modal').classList.add('hidden'); editingId=null; }

async function saveCustomer(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){ alert('名前を入力してください'); return; }

  const btn=document.getElementById('save-btn');
  btn.textContent='保存中...'; btn.disabled=true;

  const csSessions=[];
  document.querySelectorAll('#cs-sessions-edit .cs-session').forEach((row,i)=>{
    const inputs=row.querySelectorAll('input');
    const date=inputs[0].value, memo=inputs[1].value;
    if(date||memo) csSessions.push({num:i+1,date,memo});
  });

  const noteText=document.getElementById('f-note').value.trim();
  const now=new Date().toISOString();

  try {
    if(editingId){
      const c=customers.find(x=>x.id===editingId);
      const notes=c.notes||[];
      if(noteText) notes.unshift({date:now,text:noteText});
      const record={
        id:editingId, name, contact:document.getElementById('f-contact').value,
        age:document.getElementById('f-age').value, gender:document.getElementById('f-gender').value,
        job:document.getElementById('f-job').value, source:document.getElementById('f-source').value,
        source_detail:document.getElementById('f-source-detail').value, source_memo:document.getElementById('f-source-memo').value,
        owner:document.getElementById('f-owner').value, destination:document.getElementById('f-dest').value,
        type:document.getElementById('f-type').value, duration:document.getElementById('f-duration').value,
        timing:document.getElementById('f-timing').value, budget:document.getElementById('f-budget').value,
        step_type:document.getElementById('f-step').value, school:document.getElementById('f-school').value,
        course:document.getElementById('f-course').value, weeks:document.getElementById('f-weeks').value,
        tuition:document.getElementById('f-tuition').value, departure:document.getElementById('f-departure').value||null,
        return_date:document.getElementById('f-return').value||null, stage:document.getElementById('f-stage').value,
        follow_up:document.getElementById('f-followup').value||null,
        elme:document.getElementById('f-elme').checked, deposit:document.getElementById('f-deposit').checked,
        contract:document.getElementById('f-contract').checked, cancel_reason:document.getElementById('f-cancel-reason').value,
        cs_sessions:csSessions, notes, updated_at:now
      };
      await upsert(record);
    } else {
      const record={
        id:uid(), num:nextNum(), name,
        contact:document.getElementById('f-contact').value, age:document.getElementById('f-age').value,
        gender:document.getElementById('f-gender').value, job:document.getElementById('f-job').value,
        source:document.getElementById('f-source').value, source_detail:document.getElementById('f-source-detail').value,
        source_memo:document.getElementById('f-source-memo').value, owner:document.getElementById('f-owner').value,
        destination:document.getElementById('f-dest').value, type:document.getElementById('f-type').value,
        duration:document.getElementById('f-duration').value, timing:document.getElementById('f-timing').value,
        budget:document.getElementById('f-budget').value, step_type:document.getElementById('f-step').value,
        school:document.getElementById('f-school').value, course:document.getElementById('f-course').value,
        weeks:document.getElementById('f-weeks').value, tuition:document.getElementById('f-tuition').value,
        departure:document.getElementById('f-departure').value||null, return_date:document.getElementById('f-return').value||null,
        stage:document.getElementById('f-stage').value, follow_up:document.getElementById('f-followup').value||null,
        elme:document.getElementById('f-elme').checked, deposit:document.getElementById('f-deposit').checked,
        contract:document.getElementById('f-contract').checked, cancel_reason:document.getElementById('f-cancel-reason').value,
        cs_sessions:csSessions, notes:noteText?[{date:now,text:noteText}]:[],
        created_at:now, updated_at:now
      };
      await upsert(record);
    }
    await loadCustomers();
    closeAddModal();
    refresh();
  } catch(e){
    alert('保存に失敗しました: '+e.message);
  } finally {
    btn.textContent='保存する'; btn.disabled=false;
  }
}

  try { await upsert({...c, stage, updated_at:new Date().toISOString()}); await loadCustomers(); refresh(); openDetail(viewingId); }

}

async function quickFollowup(){
  const date=prompt('次回フォロー日（YYYY-MM-DD）', new Date().toISOString().slice(0,10));
  if(!date) return;
  const c=customers.find(x=>x.id===viewingId);
  try { await upsert({...c, follow_up:date, updated_at:new Date().toISOString()}); await loadCustomers(); refresh(); openDetail(viewingId); }
  catch(e){ alert('更新失敗: '+e.message); }
}

async function addNote(id){
  const text=document.getElementById('new-note-text').value.trim();
  if(!text) return;
  const c=customers.find(x=>x.id===id);
  const notes=[{date:new Date().toISOString(),text},...(c.notes||[])];
  try { await upsert({...c, notes, updated_at:new Date().toISOString()}); await loadCustomers(); openDetail(id); }
  catch(e){ alert('保存失敗: '+e.message); }
}

function editFromDetail(){ closeDetailModal(); openAddModal(viewingId); }

async function deleteCustomer(){
  if(!confirm('この顧客を削除しますか？この操作は取り消せません。')) return;
  try { await dbDelete(viewingId); await loadCustomers(); closeDetailModal(); refresh(); }
  catch(e){ alert('削除失敗: '+e.message); }
}

function exportCSV(){
  const h=['顧客番号','名前','ステージ','担当','渡航興味国','留学種別','CS回数','エルメ','デポジット','契約','契約日(支払い完了日)','流入元(大)','流入元(詳細)','流入元メモ','年齢','性別','職業','連絡先','希望期間','希望時期','予算','学校名','コース','週数','学費','渡航日','帰国日','次回フォロー','登録日'];
  const rows=customers.map(c=>[c.num||'',c.name,c.stage,c.owner||'',c.destination||'',c.type||'',(c.cs_sessions||[]).filter(s=>s.date).length,c.elme?'済':'',c.deposit?'済':'',c.contract?'済':'',(c.contract_date||'').slice(0,10),c.source||'',c.source_detail||'',c.source_memo||'',c.age||'',c.gender||'',c.job||'',c.contact||'',c.duration||'',c.timing||'',c.budget||'',c.school||'',c.course||'',c.weeks||'',c.tuition||'',c.departure||'',c.return_date||'',c.follow_up||'',(c.created_at||'').slice(0,10)]);
  const csv=[h,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`crm_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ━━━━━━━ UTILS ━━━━━━━
function parseDate(s){
  if(!s) return null;
  // "2024.10.16（水）" → 2024-10-16
  const m1 = String(s).match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  if(m1) return new Date(+m1[1], +m1[2]-1, +m1[3]);
  const d = new Date(s);
  return isNaN(d) ? null : d;
}
function fmtDate(s){ const d=parseDate(s); if(!d) return '―'; return `${d.getMonth()+1}/${d.getDate()}`; }
function fmtDateFull(s){ const d=parseDate(s); if(!d) return '―'; return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; }
function fmtDateTime(s){ const d=parseDate(s); if(!d) return ''; return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; }
function followStyle(c){
  if(!c.follow_up) return '';
  const today=new Date(); today.setHours(0,0,0,0);
  const soon=new Date(today); soon.setDate(soon.getDate()+3);
  const fd=parseDate(c.follow_up);
  if(!fd) return '';
  if(fd<today) return 'color:var(--red);font-weight:700';
  if(fd<=soon) return 'color:var(--orange);font-weight:600';
  return '';
}
function refresh(){
  const active=document.querySelector('.page.active');
  if(!active) return;
  if(active.id==='page-dashboard') renderDashboard();
  if(active.id==='page-customers') renderTable();
  if(active.id==='page-kanban') renderKanban();
  if(active.id==='page-monthly') renderMonthly();
}
